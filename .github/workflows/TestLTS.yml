name: Test LTS

on:
  workflow_dispatch:

jobs:
  setup-dotnet:
    # runs-on: ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest,ubuntu-22.04, macos-latest,ubuntu-24.04-arm,ubuntu-22.04-arm, macos-15-intel] # [windows-latest,windows-11-arm ]  
    

    steps:
      # Enable on Macos/linux
      - name: Install .NET 6 on x64
