name: Test arch using env 

on:
  workflow_dispatch: 

jobs:
  testcross:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
            os: [macos-15-intel, macos-latest, ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]
            arch: [x64, x86, arm64]           

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: |
          dotnet --info
      - uses:  HarithaVattikuti/setup-dotnet@testarch
        with:
         architecture : ${{ matrix.arch }}
         dotnet-version: '10.0.102'    
      - run: dotnet --info
  
  testarchonmacubuntu:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
            os: [macos-15-intel, macos-latest, ubuntu-latest, ubuntu-24.04-arm]
            arch: [x64, arm64, amd64]           

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: |
          dotnet --info
      - name: Set DOTNET_INSTALL_DIR
        run: echo "DOTNET_INSTALL_DIR=${{ runner.temp }}/.dotnet" >> $GITHUB_ENV
      - uses:  HarithaVattikuti/setup-dotnet@testarch
        with:
         architecture : ${{ matrix.arch }}
         dotnet-version: '10.0.102'    
      - run: dotnet --info

  testarchonwin:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
            os: [windows-latest, windows-11-arm]
            arch: [x64,x86, arm64, amd64]           
            
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: |
          dotnet --info
      - name: Set DOTNET_INSTALL_DIR
        shell: pwsh
        run: |
          "DOTNET_INSTALL_DIR=$env:USERPROFILE\.dotnet" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append          
      - uses:  HarithaVattikuti/setup-dotnet@testarch
        with:
         architecture : ${{ matrix.arch }}
         dotnet-version: '10.0.102'    
      - run: dotnet --info
