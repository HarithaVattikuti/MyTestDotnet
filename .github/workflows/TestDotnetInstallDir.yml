name: check dotnet install dir

on:
  workflow_dispatch:

jobs:

  default:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
            os: [windows-latest, windows-11-arm]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: |
          dotnet --info
      - name: Set DOTNET_INSTALL_DIR
        shell: pwsh
        run: |
          "DOTNET_INSTALL_DIR=$env:USERPROFILE\.dotnet" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append      
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.102'          
      - run: dotnet --info
