name: Test impact of DOTNET_INSTALL_DIR 

on:
  workflow_dispatch:

jobs:
  cross-arch-mismatch:
    runs-on: windows-latest
    name: "test"
    steps:
      # - name: Set DOTNET_INSTALL_DIR
      #   run: |
      #     "DOTNET_INSTALL_DIR=$env:USERPROFILE\.dotnet" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install .NET x86
        uses: HarithaVattikuti/setup-dotnet@testarch
        with:
          dotnet-version: '10.0.101'
          architecture: 'x86'
      - run: dotnet --info
      - name: Echo DOTNET_INSTALL_DIR and DOTNET_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "DOTNET_INSTALL_DIR=$env:DOTNET_INSTALL_DIR"
          Write-Host "DOTNET_ROOT=$env:DOTNET_ROOT"
      - name: Install .NET x64
        uses: HarithaVattikuti/setup-dotnet@testarch
        with:
          dotnet-version: '10.0.102'
      - run: dotnet --info
      - name: Echo DOTNET_INSTALL_DIR and DOTNET_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "DOTNET_INSTALL_DIR=$env:DOTNET_INSTALL_DIR"
          Write-Host "DOTNET_ROOT=$env:DOTNET_ROOT"
  
  cross-arch-mismatchmac:
    runs-on: macos-latest
    name: "test"
    steps:
      # - name: Set DOTNET_INSTALL_DIR
      #   run: |
      #     "DOTNET_INSTALL_DIR=$env:USERPROFILE\.dotnet" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install .NET x64
        uses: HarithaVattikuti/setup-dotnet@testarch
        with:
          dotnet-version: '10.0.101'
          architecture: 'x64'
      - run: dotnet --info
      - name: Echo DOTNET_INSTALL_DIR and DOTNET_ROOT
        run: |
          echo "DOTNET_INSTALL_DIR=$DOTNET_INSTALL_DIR"
          echo "DOTNET_ROOT=$DOTNET_ROOT"
      - name: Install .NET arm64
        uses: HarithaVattikuti/setup-dotnet@testarch
        with:
          dotnet-version: '10.0.102'
      - run: dotnet --info
      - name: Echo DOTNET_INSTALL_DIR and DOTNET_ROOT
        run: |
          echo "DOTNET_INSTALL_DIR=$DOTNET_INSTALL_DIR"
          echo "DOTNET_ROOT=$DOTNET_ROOT"
