name: test single architecture on windows

on: 
 push:

jobs:
  Defaultcheck:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
            os: [windows-latest]
            # arch: ['x64', 'arm64','x86']

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet: |
            9.0.308
      - run: dotnet --info

  Archcheck:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
            os: [windows-latest]
            # arch: ['x64', 'arm64','x86']

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: lmvysakh/setup-dotnet@support_architecture
        with:
         architecture : 'x86'
         dotnet-version: | 
                  9.0.308
      - run: dotnet --info
