name: Test tool cache version

on:
  workflow_dispatch:


jobs:
  testv6:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        vers: ['9.0.x', '10.0.x','8.0.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ matrix.vers }}
          

  testv5:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        vers: ['9.0.x', '10.0.x','8.0.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.vers }}
